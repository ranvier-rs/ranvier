[package]
name = "ranvier-observe"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
version = "0.14.1"
edition.workspace = true
rust-version.workspace = true
description = "Observability and OTLP integration for Ranvier"

[dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "registry", "std"] }
opentelemetry = { version = "0.22", features = ["trace"] }
opentelemetry_sdk = { version = "0.22", features = ["rt-tokio", "trace"] }
opentelemetry-otlp = { version = "0.15", default-features = false, features = ["trace", "grpc-tonic", "http-proto", "reqwest-client"] }
tracing-opentelemetry = "0.23"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
http = { workspace = true }
tower = { workspace = true }

