[package]
name = "ranvier-session"
version = "0.7.0"
edition = "2024"
authors = ["ranvier"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cellaxon/ranvier"
description = "Session management and caching support for the Ranvier Typed Decision Engine framework."
categories = ["asynchronous", "web-programming"]
keywords = ["session", "cache", "redis", "middleware"]

[dependencies]
ranvier-core = { path = "../../core", version = "0.11.0" }
ranvier-runtime = { path = "../../runtime", version = "0.11.0" }
tokio = { version = "1.43", features = ["full"] }
tower = "0.5"
http = "1.1"
bytes = "1.5"
http-body-util = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
uuid = { version = "1.10", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Redis backend
redis = { version = "0.27", features = ["tokio-comp"], optional = true }

[features]
default = []
redis-store = ["dep:redis"]