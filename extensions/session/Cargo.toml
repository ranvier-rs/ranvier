[package]
name = "ranvier-session"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Session management and caching support for the Ranvier Typed Decision Engine framework."
categories = ["asynchronous", "web-programming"]
keywords = ["session", "cache", "redis", "middleware"]

[dependencies]
ranvier-core = { workspace = true }
ranvier-runtime = { workspace = true }
tokio = { version = "1.43", features = ["full"] }
tower = "0.5"
http = "1.1"
bytes = "1.5"
http-body-util = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
anyhow = "1.0"
uuid = { version = "1.10", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Redis backend
redis = { version = "0.27", features = ["tokio-comp"], optional = true }

[features]
default = []
redis-store = ["dep:redis"]
[lints]
workspace = true
