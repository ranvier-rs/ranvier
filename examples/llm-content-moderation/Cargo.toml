[package]
name = "llm-content-moderation"
version = "0.1.0"
edition = "2024"
description = "M230: LLM Integration Pattern — AI Content Moderation with Decision Engine"

[[bin]]
name = "llm-content-moderation"
path = "src/main.rs"

[dependencies]
ranvier-core    = { path = "../../core", version = "0.27.0" }
ranvier-macros  = { path = "../../macros", version = "0.27.0" }
ranvier-runtime = { path = "../../runtime", version = "0.27.0" }
ranvier-http    = { path = "../../http", version = "0.27.0" }
async-trait     = "0.1"
anyhow          = "1.0"
serde           = { version = "1.0", features = ["derive"] }
serde_json      = "1.0"
tokio           = { version = "1", features = ["full"] }
tracing         = "0.1"
tracing-subscriber = "0.3"
