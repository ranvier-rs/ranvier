[package]
name = "otel-demo"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
[dependencies]
ranvier-core = { workspace = true }
ranvier-runtime = { workspace = true }
ranvier-observe = { workspace = true }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
opentelemetry = { version = "0.22", features = ["metrics", "trace"] }
opentelemetry_sdk = { version = "0.22", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.15", default-features = false, features = ["metrics", "grpc-tonic", "http-proto", "reqwest-client"] }


[lints]
workspace = true
