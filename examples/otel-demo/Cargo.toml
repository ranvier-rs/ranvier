[package]
name = "otel-demo"
version = "0.1.0"
edition = "2021"

[dependencies]
ranvier-core = { path = "../../core" }
ranvier-runtime = { path = "../../runtime" }
ranvier-observe = { path = "../../extensions/observe" }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
anyhow = "1.0"
tracing = "0.1"
opentelemetry = { version = "0.22", features = ["metrics", "trace"] }
opentelemetry_sdk = { version = "0.22", features = ["metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.15", default-features = false, features = ["metrics", "grpc-tonic", "http-proto", "reqwest-client"] }
