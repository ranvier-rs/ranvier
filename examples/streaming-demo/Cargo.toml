[package]
name = "streaming-demo"
version = "0.1.0"
edition = "2024"
description = "M308: Streaming Pipeline — LLM Chat Streaming with SSE"

[[bin]]
name = "streaming-demo"
path = "src/main.rs"

[dependencies]
ranvier-core    = { path = "../../core", version = "0.37.0", features = ["streaming"] }
ranvier-runtime = { path = "../../runtime", version = "0.37.0", features = ["streaming"] }
ranvier-http    = { path = "../../http", version = "0.37.0", features = ["streaming"] }
ranvier-guard   = { path = "../../guard", version = "0.37.0" }
async-trait     = "0.1"
serde           = { version = "1.0", features = ["derive"] }
serde_json      = "1.0"
tokio           = { version = "1", features = ["full"] }
tracing         = "0.1"
tracing-subscriber = "0.3"
schemars        = { version = "1", features = ["derive"] }
futures-core    = "0.3"
futures-util    = "0.3"
async-stream    = "0.3"
