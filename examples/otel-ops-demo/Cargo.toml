[package]
name = "otel-ops-demo"
version = "0.1.0"
edition = "2021"
description = "M154: OTel Ops Playbook — policy enforcement demonstration"

[[bin]]
name = "otel-ops-demo"
path = "src/main.rs"

[dependencies]
anyhow          = "1.0"
tokio           = { version = "1", features = ["full"] }
tracing         = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
