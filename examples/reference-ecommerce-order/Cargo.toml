[package]
name = "reference-ecommerce-order"
version = "0.1.0"
edition = "2024"
description = "M226: Reference Application ??E-commerce Order Pipeline with Saga Compensation, Audit Trail, and Multi-tenancy"

[[bin]]
name = "reference-ecommerce-order"
path = "src/main.rs"

[dependencies]
ranvier-core    = { path = "../../core", version = "0.42.0" }
ranvier-macros  = { path = "../../macros", version = "0.42.0" }
ranvier-runtime = { path = "../../runtime", version = "0.42.0" }
ranvier-http    = { path = "../../http", version = "0.42.0" }
ranvier-audit   = { path = "../../extensions/audit", version = "0.42.0" }
async-trait     = "0.1"
anyhow          = "1.0"
http            = "1"
serde           = { version = "1.0", features = ["derive"] }
serde_json      = "1.0"
tokio           = { version = "1", features = ["full"] }
tracing         = "0.1"
tracing-subscriber = "0.3"
jsonwebtoken    = "9"
thiserror       = "1.0"
uuid            = { version = "1.6", features = ["v4"] }
chrono          = { version = "0.4", features = ["serde"] }
schemars        = { version = "1", features = ["derive"] }
