[package]
name = "reference-todo-api"
version = "0.1.0"
edition = "2024"
description = "M219: Reference Application ??Todo API with CRUD, Auth, and testing"

[[bin]]
name = "reference-todo-api"
path = "src/main.rs"

[dependencies]
ranvier-core    = { path = "../../core", version = "0.44.0" }
ranvier-macros  = { path = "../../macros", version = "0.44.0" }
ranvier-runtime = { path = "../../runtime", version = "0.44.0" }
ranvier-http    = { path = "../../http", version = "0.44.0" }
async-trait     = "0.1"
anyhow          = "1.0"
http            = "1"
serde           = { version = "1.0", features = ["derive"] }
serde_json      = "1.0"
tokio           = { version = "1", features = ["full"] }
tracing         = "0.1"
tracing-subscriber = "0.3"
jsonwebtoken    = "9"
thiserror       = "1.0"
schemars        = { version = "1", features = ["derive"] }