# Production Operations Demo — ranvier.toml
#
# Demonstrates the full operational stack:
#   config → health → metrics → access logging → telemetry

[server]
host = "0.0.0.0"
port = 3000
shutdown_timeout_secs = 30

[logging]
format = "pretty"
level = "info"

[logging.module_levels]
ranvier_runtime = "debug"
ranvier_http = "info"

[tls]
enabled = false

[inspector]
enabled = true
port = 3001

[telemetry]
# otlp_endpoint = "http://localhost:4317"   # uncomment to enable OTLP export
otlp_protocol = "grpc"
service_name = "production-operations-demo"
sample_ratio = 1.0

# ── Profile Overrides ──

[profile.prod.logging]
format = "json"
level = "warn"

[profile.prod.tls]
enabled = true

[profile.prod.telemetry]
otlp_endpoint = "http://otel-collector:4317"
sample_ratio = 0.1
