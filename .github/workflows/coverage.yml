name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Product coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: product-coverage

      - name: Resolve pinned coverage engine
        id: coverage-policy
        run: node -e "process.stdout.write('version=' + require('./.ranvier-coverage-policy.json').engine.version + '\n')" >> "$GITHUB_OUTPUT"

      - name: Install pinned coverage engine
        run: cargo install cargo-llvm-cov --version "${{ steps.coverage-policy.outputs.version }}" --locked

      - name: Prove negative gate behavior
        run: node scripts/coverage_gate.mjs --self-test

      - name: Generate and enforce product coverage
        run: node scripts/coverage_gate.mjs --run --output-dir coverage
        env:
          REDIS_URL: redis://127.0.0.1:6379

      - name: Detect optional Codecov mirror
        id: codecov
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -n "$CODECOV_TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Codecov when configured
        if: ${{ steps.codecov.outputs.configured == 'true' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Record missing optional Codecov mirror
        if: ${{ steps.codecov.outputs.configured == 'false' }}
        run: echo "CODECOV_TOKEN is not available; the required local gate and GitHub artifact remain authoritative."

      - name: Upload required coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: error
          retention-days: 30
