name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  compiler-msrv:
    name: Compiler MSRV (Rust 1.93.0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: compiler-msrv-1.93.0
      - name: Verify exact compiler and locked workspace
        run: |
          rustc +1.93.0 --version
          cargo +1.93.0 --version
          cargo +1.93.0 check --workspace --all-targets --all-features --locked

  stable-platform:
    name: Stable compile (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-${{ runner.os }}
      - name: Compile locked workspace on current stable
        run: |
          rustc --version
          cargo --version
          cargo check --workspace --all-targets --all-features --locked

  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: node scripts/list_manifest_examples.mjs --verify-portfolio --verify-workspace-members
      - run: node scripts/candidate_api_baseline.mjs --check
      - run: node scripts/candidate_compile_contract.mjs
      - run: node scripts/tiered_example_gate.mjs --lane developer --phase check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: node scripts/tiered_example_gate.mjs --lane developer --phase test
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - run: cargo test -p ranvier-guard --features distributed
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - run: cargo test -p ranvier-guard --features advanced

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: node scripts/tiered_example_gate.mjs --lane developer --phase clippy
